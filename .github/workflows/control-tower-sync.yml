name: Control Tower Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "ops/control-tower.md"
      - "ops/control-tower.snapshot.json"

permissions:
  contents: write

concurrency:
  group: control-tower-sync
  cancel-in-progress: false

jobs:
  refresh-control-tower:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update control tower artifacts
        run: node scripts/update-control-tower.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit changes if any
        run: |
          if git diff --quiet -- ops/control-tower.md ops/control-tower.snapshot.json; then
            echo "No control tower changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/control-tower.md ops/control-tower.snapshot.json
          git commit -m "chore: refresh control tower snapshot"
          git push

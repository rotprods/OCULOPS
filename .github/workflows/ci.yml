# OCULOPS CI/CD
# Badge: ![CI](https://github.com/rotprods/ANTIGRAVITY-OS/actions/workflows/ci.yml/badge.svg)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --reporter=verbose
        env:
          CI: true

      - name: Build check
        run: npm run build
        env:
          NODE_OPTIONS: --no-experimental-require-module
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Readiness gate
        if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run readiness:gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          READINESS_GATE_MODE: ${{ vars.READINESS_GATE_MODE || 'synthetic' }}
          READINESS_PRODUCTION_CRITICAL_MODULES: ${{ vars.READINESS_PRODUCTION_CRITICAL_MODULES }}
          READINESS_PRODUCTION_NON_CRITICAL_STATES: ${{ vars.READINESS_PRODUCTION_NON_CRITICAL_STATES }}
          READINESS_PRODUCTION_STRICT_ALL_CONNECTED: ${{ vars.READINESS_PRODUCTION_STRICT_ALL_CONNECTED || 'false' }}
          READINESS_ORG_ID: ${{ vars.READINESS_ORG_ID }}

      - name: Readiness gate skipped
        if: ${{ secrets.SUPABASE_URL == '' || secrets.SUPABASE_SERVICE_ROLE_KEY == '' }}
        run: echo "Readiness gate skipped: SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY secrets not configured in this repo."

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for .env files in repo
        run: |
          ENV_FILES=$(git ls-files '*.env' '.env*' '**/.env' '**/.env.*' 2>/dev/null || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Found .env files tracked in git:"
            echo "$ENV_FILES"
            exit 1
          fi
          echo "No .env files found in git. OK."

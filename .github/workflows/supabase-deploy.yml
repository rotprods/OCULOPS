# Supabase Deploy — Edge Functions + Migrations
# Badge: ![Supabase Deploy](https://github.com/rotprods/ANTIGRAVITY-OS/actions/workflows/supabase-deploy.yml/badge.svg)

name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

concurrency:
  group: supabase-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-migrations:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits), 'supabase/migrations')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations
        run: supabase db push --project-ref yxzdafptqtcvpsbqkmkm
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits), 'supabase/functions')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      - name: Deploy functions
        run: supabase functions deploy --project-ref yxzdafptqtcvpsbqkmkm --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Project APIs -> n8n bridge smoke
        run: npm run smoke:project-apis-bridge
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROJECT_APIS_BRIDGE_SMOKE_APPLY: ${{ vars.PROJECT_APIS_BRIDGE_SMOKE_APPLY }}
          PROJECT_APIS_BRIDGE_SMOKE_LIMIT: ${{ vars.PROJECT_APIS_BRIDGE_SMOKE_LIMIT }}

      - name: Readiness gate (post-deploy)
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Readiness gate skipped: SUPABASE_URL/SUPABASE_SERVICE_ROLE_KEY secrets not configured in this repo."
            exit 0
          fi
          npm run readiness:gate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          READINESS_GATE_MODE: ${{ vars.READINESS_GATE_MODE }}
          READINESS_PRODUCTION_CRITICAL_MODULES: ${{ vars.READINESS_PRODUCTION_CRITICAL_MODULES }}
          READINESS_PRODUCTION_NON_CRITICAL_STATES: ${{ vars.READINESS_PRODUCTION_NON_CRITICAL_STATES }}
          READINESS_PRODUCTION_STRICT_ALL_CONNECTED: ${{ vars.READINESS_PRODUCTION_STRICT_ALL_CONNECTED }}
          READINESS_ORG_ID: ${{ vars.READINESS_ORG_ID }}

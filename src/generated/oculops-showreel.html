<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCULOPS — Motion Showreel</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --canvas: #FAFAF8;
    --gold: #FFD700;
    --gold-deep: #D4AF37;
    --gold-muted: rgba(255,215,0,0.10);
    --gold-border: rgba(255,215,0,0.30);
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #9CA3AF;
    --border: #E5E5E0;
    --card: #FFFFFF;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--canvas);
    font-family: var(--font-sans);
    color: var(--text-primary);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }

  /* ── Cursor ── */
  .cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--gold);
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
  }

  /* ── Preloader ── */
  .preloader {
    position: fixed;
    inset: 0;
    background: var(--canvas);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .preloader-logo {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 8px;
    color: var(--text-primary);
    margin-bottom: 32px;
  }

  .preloader-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .preloader-fill {
    height: 100%;
    width: 0%;
    background: var(--gold);
    border-radius: 1px;
  }

  .preloader-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 12px;
  }

  /* ── Main Stage ── */
  .stage {
    position: fixed;
    inset: 0;
    opacity: 0;
  }

  /* ── Hero Display ── */
  .hero-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85vw;
    max-width: 1400px;
    aspect-ratio: 16/10;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.08), 0 0 0 1px var(--border);
    background: var(--card);
  }

  .hero-frame img,
  .hero-frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .hero-frame .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
  }

  .hero-frame .slide.active {
    opacity: 1;
  }

  /* ── Floating UI Elements ── */
  .screen-label {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
  }

  .screen-label .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  .screen-label .name {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .screen-label .counter {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
  }

  /* ── Top Bar ── */
  .topbar {
    position: absolute;
    top: 24px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    opacity: 0;
  }

  .topbar-brand {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 6px;
    color: var(--text-primary);
  }

  .topbar-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-tertiary);
    display: flex;
    gap: 20px;
  }

  /* ── Heartbeat ── */
  .heartbeat {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 60vw;
    height: 24px;
    opacity: 0;
  }

  .heartbeat canvas {
    width: 100%;
    height: 100%;
  }

  /* ── Progress Dots ── */
  .progress-dots {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
  }

  .progress-dots .pip {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.4s ease;
  }

  .progress-dots .pip.active {
    background: var(--gold);
    box-shadow: 0 0 6px rgba(255,215,0,0.5);
    transform: scale(1.5);
  }

  /* ── Particle Canvas ── */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* ── Video Overlay ── */
  .video-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 85vw;
    max-width: 1400px;
    aspect-ratio: 16/10;
    border-radius: 16px;
    overflow: hidden;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 8px 60px rgba(0,0,0,0.12);
  }

  .video-overlay video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ── Controls hint ── */
  .controls {
    position: fixed;
    bottom: 8px;
    right: 16px;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-tertiary);
    opacity: 0;
    z-index: 50;
  }

  /* ── Gallery Mode ── */
  .gallery {
    position: fixed;
    inset: 0;
    background: var(--canvas);
    z-index: 100;
    overflow-y: auto;
    padding: 80px 40px;
    display: none;
    opacity: 0;
  }

  .gallery-header {
    text-align: center;
    margin-bottom: 60px;
  }

  .gallery-header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 8px;
    margin-bottom: 8px;
  }

  .gallery-header p {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .gallery-card {
    border-radius: 12px;
    overflow: hidden;
    background: var(--card);
    box-shadow: var(--shadow), 0 0 0 1px var(--border);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .gallery-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.1), 0 0 0 1px var(--gold-border);
  }

  .gallery-card img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
  }

  .gallery-card .card-info {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
  }

  .gallery-card .card-name {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-primary);
  }

  .gallery-card .card-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--gold-muted);
    color: var(--gold-deep);
    font-weight: 500;
  }

  .gallery-card.has-video .card-badge {
    background: var(--gold);
    color: #000;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<!-- PRELOADER -->
<div class="preloader" id="preloader">
  <div class="preloader-logo">OCULOPS</div>
  <div class="preloader-bar"><div class="preloader-fill" id="preloaderFill"></div></div>
  <div class="preloader-count" id="preloaderCount">Loading 0 / 34</div>
</div>

<!-- MAIN STAGE -->
<div class="stage" id="stage">
  <div class="topbar" id="topbar">
    <div class="topbar-brand">OCULOPS</div>
    <div class="topbar-meta">
      <span>AUTONOMOUS GROWTH OS</span>
      <span id="clock"></span>
    </div>
  </div>

  <div class="hero-frame" id="heroFrame"></div>

  <div class="screen-label" id="screenLabel">
    <div class="dot"></div>
    <div class="name" id="screenName"></div>
    <div class="counter" id="screenCounter"></div>
  </div>

  <div class="progress-dots" id="progressDots"></div>

  <canvas class="particles" id="particles"></canvas>

  <div class="heartbeat" id="heartbeat">
    <canvas id="heartbeatCanvas"></canvas>
  </div>

  <div class="controls" id="controls">
    SPACE pause &middot; G gallery &middot; &larr;&rarr; navigate
  </div>
</div>

<!-- GALLERY MODE -->
<div class="gallery" id="gallery">
  <div class="gallery-header">
    <h1>OCULOPS</h1>
    <p>34 screens &middot; Autonomous Growth Operating System &middot; press ESC to return</p>
  </div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<script>
const SCREENS = [
  { slug: 'control-tower', name: 'Control Tower', video: false },
  { slug: 'pipeline', name: 'Pipeline', video: false },
  { slug: 'crm', name: 'CRM', video: false },
  { slug: 'intelligence', name: 'Intelligence', video: true },
  { slug: 'execution', name: 'Execution', video: false },
  { slug: 'finance', name: 'Finance', video: true },
  { slug: 'markets', name: 'Markets', video: false },
  { slug: 'analytics', name: 'Analytics', video: false },
  { slug: 'opportunities', name: 'Opportunities', video: false },
  { slug: 'reports', name: 'Reports', video: false },
  { slug: 'agents', name: 'Agents', video: false },
  { slug: 'herald', name: 'Herald', video: false },
  { slug: 'prospector', name: 'Prospector', video: false },
  { slug: 'automation', name: 'Automation', video: false },
  { slug: 'flight-deck', name: 'Flight Deck', video: false },
  { slug: 'pixel-office', name: 'Pixel Office', video: false },
  { slug: 'marketplace', name: 'Marketplace', video: false },
  { slug: 'gtm', name: 'GTM', video: false },
  { slug: 'messaging', name: 'Messaging', video: false },
  { slug: 'creative', name: 'Creative', video: false },
  { slug: 'niches', name: 'Niches', video: false },
  { slug: 'knowledge', name: 'Knowledge', video: false },
  { slug: 'decisions', name: 'Decisions', video: false },
  { slug: 'experiments', name: 'Experiments', video: false },
  { slug: 'simulation', name: 'Simulation', video: false },
  { slug: 'studies', name: 'Studies', video: true },
  { slug: 'command-center', name: 'Command Center', video: false },
  { slug: 'watchtower', name: 'Watchtower', video: true },
  { slug: 'world-monitor', name: 'World Monitor', video: false },
  { slug: 'portfolio', name: 'Portfolio', video: true },
  { slug: 'lab', name: 'Lab', video: true },
  { slug: 'billing', name: 'Billing', video: false },
  { slug: 'team-settings', name: 'Team Settings', video: true },
  { slug: 'settings', name: 'Settings', video: true },
]

let current = 0
let playing = true
let galleryOpen = false
let imagesLoaded = 0

// ── Custom Cursor ──
document.addEventListener('mousemove', e => {
  gsap.to('#cursor', { x: e.clientX, y: e.clientY, duration: 0.15, ease: 'power2.out' })
})

// ── Clock ──
function updateClock() {
  const now = new Date()
  const h = String(now.getHours()).padStart(2, '0')
  const m = String(now.getMinutes()).padStart(2, '0')
  const s = String(now.getSeconds()).padStart(2, '0')
  document.getElementById('clock').textContent = `${h}:${m}:${s}`
}
setInterval(updateClock, 1000)
updateClock()

// ── Preload Images ──
function preload() {
  const heroFrame = document.getElementById('heroFrame')
  const progressDots = document.getElementById('progressDots')
  const galleryGrid = document.getElementById('galleryGrid')

  SCREENS.forEach((screen, i) => {
    // Slide
    const slide = document.createElement('div')
    slide.className = 'slide'
    slide.dataset.index = i
    const img = document.createElement('img')
    img.src = `${screen.slug}/hero.png`
    img.alt = screen.name
    img.onload = () => {
      imagesLoaded++
      document.getElementById('preloaderCount').textContent = `Loading ${imagesLoaded} / ${SCREENS.length}`
      gsap.to('#preloaderFill', { width: `${(imagesLoaded / SCREENS.length) * 100}%`, duration: 0.3 })
      if (imagesLoaded === SCREENS.length) startShowreel()
    }
    img.onerror = () => {
      imagesLoaded++
      if (imagesLoaded === SCREENS.length) startShowreel()
    }
    slide.appendChild(img)
    heroFrame.appendChild(slide)

    // Progress dot
    const pip = document.createElement('div')
    pip.className = 'pip'
    progressDots.appendChild(pip)

    // Gallery card
    const card = document.createElement('div')
    card.className = `gallery-card${screen.video ? ' has-video' : ''}`
    card.innerHTML = `
      <img src="${screen.slug}/hero.png" alt="${screen.name}" loading="lazy">
      <div class="card-info">
        <span class="card-name">${screen.name}</span>
        <span class="card-badge">${screen.video ? 'VIDEO' : 'SCREEN'}</span>
      </div>
    `
    card.addEventListener('click', () => {
      current = i
      closeGallery()
      showSlide(current)
    })
    galleryGrid.appendChild(card)
  })
}

// ── Particles ──
function initParticles() {
  const canvas = document.getElementById('particles')
  const ctx = canvas.getContext('2d')
  const dpr = window.devicePixelRatio || 1
  let particles = []

  function resize() {
    canvas.width = window.innerWidth * dpr
    canvas.height = window.innerHeight * dpr
    ctx.scale(dpr, dpr)
    canvas.style.width = window.innerWidth + 'px'
    canvas.style.height = window.innerHeight + 'px'
  }
  resize()
  window.addEventListener('resize', resize)

  for (let i = 0; i < 25; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vy: -0.15 - Math.random() * 0.25,
      size: 1.5 + Math.random() * 2,
      opacity: 0.08 + Math.random() * 0.15,
      phase: Math.random() * Math.PI * 2,
    })
  }

  function draw() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight)
    particles.forEach(p => {
      p.y += p.vy
      p.phase += 0.008
      p.x += Math.sin(p.phase) * 0.3
      if (p.y < -10) { p.y = window.innerHeight + 10; p.x = Math.random() * window.innerWidth }
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2)
      ctx.fillStyle = `rgba(255,215,0,${p.opacity})`
      ctx.shadowBlur = 6
      ctx.shadowColor = 'rgba(255,215,0,0.2)'
      ctx.fill()
      ctx.shadowBlur = 0
    })
    requestAnimationFrame(draw)
  }
  draw()
}

// ── Heartbeat ──
function initHeartbeat() {
  const canvas = document.getElementById('heartbeatCanvas')
  const ctx = canvas.getContext('2d')
  const dpr = window.devicePixelRatio || 1
  let phase = 0

  function resize() {
    const rect = canvas.parentElement.getBoundingClientRect()
    canvas.width = rect.width * dpr
    canvas.height = rect.height * dpr
    ctx.scale(dpr, dpr)
    canvas.style.width = rect.width + 'px'
    canvas.style.height = rect.height + 'px'
  }
  resize()
  window.addEventListener('resize', resize)

  function draw() {
    const w = canvas.width / dpr
    const h = canvas.height / dpr
    ctx.clearRect(0, 0, w, h)
    phase += 0.03

    ctx.strokeStyle = 'rgba(255,215,0,0.15)'
    ctx.lineWidth = 1
    ctx.beginPath()
    ctx.moveTo(0, h / 2)
    for (let i = 0; i <= w; i++) {
      const p = i / w
      const wave = Math.sin(p * Math.PI * 6 + phase) * 3
      const pulse = Math.exp(-Math.pow((p - 0.5) * 6, 2)) * 6
      ctx.lineTo(i, h / 2 + wave + Math.sin(p * Math.PI * 16 + phase * 2) * pulse)
    }
    ctx.stroke()

    // Tracking dot
    const dotP = (phase / (Math.PI * 2)) % 1
    const dotX = dotP * w
    const dotWave = Math.sin(dotP * Math.PI * 6 + phase) * 3
    const dotPulse = Math.exp(-Math.pow((dotP - 0.5) * 6, 2)) * 6
    const dotY = h / 2 + dotWave + Math.sin(dotP * Math.PI * 16 + phase * 2) * dotPulse
    ctx.beginPath()
    ctx.arc(dotX, dotY, 2.5, 0, Math.PI * 2)
    ctx.fillStyle = 'rgba(255,215,0,0.7)'
    ctx.shadowBlur = 8
    ctx.shadowColor = 'rgba(255,215,0,0.5)'
    ctx.fill()
    ctx.shadowBlur = 0

    requestAnimationFrame(draw)
  }
  draw()
}

// ── Show Slide ──
function showSlide(index) {
  const slides = document.querySelectorAll('.slide')
  const pips = document.querySelectorAll('.pip')
  const screen = SCREENS[index]

  // Animate out current
  slides.forEach(s => {
    if (s.classList.contains('active')) {
      gsap.to(s, { opacity: 0, scale: 1.02, duration: 0.6, ease: 'power2.inOut', onComplete: () => s.classList.remove('active') })
    }
  })

  // Animate in new
  const slide = slides[index]
  slide.classList.add('active')
  gsap.fromTo(slide, { opacity: 0, scale: 0.98 }, { opacity: 1, scale: 1, duration: 0.8, ease: 'power2.out', delay: 0.2 })

  // Update label
  gsap.to('#screenLabel', { opacity: 0, y: 10, duration: 0.3, onComplete: () => {
    document.getElementById('screenName').textContent = screen.name
    document.getElementById('screenCounter').textContent = `${String(index + 1).padStart(2, '0')} / ${SCREENS.length}`
    gsap.to('#screenLabel', { opacity: 1, y: 0, duration: 0.5, delay: 0.3 })
  }})

  // Update pips
  pips.forEach((p, i) => p.classList.toggle('active', i === index))

  // If screen has video, flash it briefly
  if (screen.video) {
    const overlay = document.querySelector('.video-overlay')
    if (!overlay) {
      const vo = document.createElement('div')
      vo.className = 'video-overlay'
      vo.innerHTML = `<video src="${screen.slug}/motion-0.mp4" muted autoplay playsinline></video>`
      document.getElementById('stage').appendChild(vo)
      gsap.to(vo, { opacity: 1, duration: 1, delay: 1.5 })
      gsap.to(vo, { opacity: 0, duration: 0.8, delay: 5, onComplete: () => vo.remove() })
    }
  }
}

// ── Auto-play ──
let autoTimer = null

function autoPlay() {
  if (!playing || galleryOpen) return
  autoTimer = setTimeout(() => {
    current = (current + 1) % SCREENS.length
    showSlide(current)
    autoPlay()
  }, SCREENS[current].video ? 6000 : 3500)
}

// ── Start ──
function startShowreel() {
  // Hide preloader
  gsap.to('#preloader', { opacity: 0, duration: 0.8, delay: 0.5, onComplete: () => {
    document.getElementById('preloader').style.display = 'none'
  }})

  // Show stage
  gsap.to('#stage', { opacity: 1, duration: 0.5, delay: 1 })
  gsap.to('#topbar', { opacity: 1, duration: 0.8, delay: 1.5 })
  gsap.to('#screenLabel', { opacity: 1, duration: 0.8, delay: 1.8 })
  gsap.to('#progressDots', { opacity: 1, duration: 0.8, delay: 2 })
  gsap.to('#heartbeat', { opacity: 1, duration: 0.8, delay: 2.2 })
  gsap.to('#controls', { opacity: 1, duration: 0.8, delay: 2.5 })

  // Init systems
  initParticles()
  initHeartbeat()

  // Start
  setTimeout(() => {
    showSlide(0)
    autoPlay()
  }, 1500)
}

// ── Gallery ──
function openGallery() {
  galleryOpen = true
  clearTimeout(autoTimer)
  const gallery = document.getElementById('gallery')
  gallery.style.display = 'block'
  gallery.style.cursor = 'auto'
  document.body.style.cursor = 'auto'
  document.getElementById('cursor').style.display = 'none'
  gsap.to(gallery, { opacity: 1, duration: 0.5 })
  gsap.to('#stage', { opacity: 0, duration: 0.3 })
}

function closeGallery() {
  galleryOpen = false
  const gallery = document.getElementById('gallery')
  document.body.style.cursor = 'none'
  document.getElementById('cursor').style.display = 'block'
  gsap.to(gallery, { opacity: 0, duration: 0.3, onComplete: () => { gallery.style.display = 'none' }})
  gsap.to('#stage', { opacity: 1, duration: 0.5 })
  autoPlay()
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault()
    playing = !playing
    if (playing) autoPlay()
    else clearTimeout(autoTimer)
  }
  if (e.key === 'ArrowRight') {
    clearTimeout(autoTimer)
    current = (current + 1) % SCREENS.length
    showSlide(current)
    if (playing) autoPlay()
  }
  if (e.key === 'ArrowLeft') {
    clearTimeout(autoTimer)
    current = (current - 1 + SCREENS.length) % SCREENS.length
    showSlide(current)
    if (playing) autoPlay()
  }
  if (e.key === 'g' || e.key === 'G') {
    if (galleryOpen) closeGallery()
    else openGallery()
  }
  if (e.key === 'Escape' && galleryOpen) closeGallery()
})

// ── Init ──
preload()
</script>
</body>
</html>
